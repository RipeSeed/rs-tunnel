services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "23432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 8080
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      SLACK_REDIRECT_URI: ${SLACK_REDIRECT_URI}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-@example.com}
      ALLOWED_SLACK_TEAM_ID: ${ALLOWED_SLACK_TEAM_ID}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_BASE_DOMAIN: ${CLOUDFLARE_BASE_DOMAIN:-tunnel.example.com}
      JWT_ACCESS_TTL_MINUTES: 15
      REFRESH_TTL_DAYS: 30
      MAX_ACTIVE_TUNNELS: 5
      HEARTBEAT_INTERVAL_SEC: 20
      LEASE_TIMEOUT_SEC: 60
      REAPER_INTERVAL_SEC: 30
    ports:
      - ":8080"

volumes:
  pgdata:
